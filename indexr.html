<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autismoware Web Radar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: #0b0c10;
            color: #c5c6c7;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex;
            height: 100vh;
        }

        /* Sidebar Glassmorphism */
        #sidebar {
            width: 320px;
            background: rgba(15, 17, 26, 0.7);
            backdrop-filter: blur(16px);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            z-index: 10;
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            color: #00ff66;
            text-shadow: 0 0 15px rgba(0, 255, 102, 0.3);
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 12px;
            color: #888e9b;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .lobby-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .lobby-label {
            font-size: 11px;
            color: #888e9b;
            text-transform: uppercase;
        }

        .lobby-value {
            font-size: 20px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: 1px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            margin-top: 5px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff3333;
            box-shadow: 0 0 10px #ff3333;
            transition: all 0.3s ease;
        }

        .status-dot.connected {
            background: #00ff66;
            box-shadow: 0 0 10px #00ff66;
        }

        /* Controls / Toggles */
        .controls-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .group-title {
            font-size: 11px;
            color: #888e9b;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 5px;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
        }

        .checkbox-label {
            font-size: 14px;
            color: #c5c6c7;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 22px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.1);
            transition: .3s;
            border-radius: 22px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: #c5c6c7;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #00ff66;
        }

        input:checked + .slider:before {
            transform: translateX(22px);
            background-color: #0b0c10;
        }

        /* Range Slider */
        .range-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .range-header {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }

        .range-input {
            width: 100%;
            accent-color: #00ff66;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            height: 6px;
            outline: none;
            -webkit-appearance: none;
        }

        /* Canvas Wrapper */
        #viewport {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: radial-gradient(circle, #161925 0%, #0b0c10 100%);
        }

        canvas {
            background: #0d0f17;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <div>
            <h1>AUTISMOware</h1>
            <div class="subtitle">Web Radar System</div>
        </div>

        <div class="lobby-box">
            <span class="lobby-label">Active Lobby</span>
            <span id="lobby-id" class="lobby-value">LOADING</span>
            <div class="status-indicator">
                <div id="status-dot" class="status-dot"></div>
                <span id="status-text">Connecting...</span>
            </div>
        </div>

        <div class="controls-group">
            <span class="group-title">Radar Visuals</span>
            
            <label class="checkbox-container">
                <span class="checkbox-label">Local Player</span>
                <span class="switch">
                    <input type="checkbox" id="show-local" checked>
                    <span class="slider"></span>
                </span>
            </label>

            <label class="checkbox-container">
                <span class="checkbox-label">Friends / Teammates</span>
                <span class="switch">
                    <input type="checkbox" id="show-friends" checked>
                    <span class="slider"></span>
                </span>
            </label>

            <label class="checkbox-container">
                <span class="checkbox-label">Enemies</span>
                <span class="switch">
                    <input type="checkbox" id="show-enemies" checked>
                    <span class="slider"></span>
                </span>
            </label>

            <label class="checkbox-container">
                <span class="checkbox-label">Rings / Grid</span>
                <span class="switch">
                    <input type="checkbox" id="show-rings" checked>
                    <span class="slider"></span>
                </span>
            </label>

            <label class="checkbox-container">
                <span class="checkbox-label">Player Names</span>
                <span class="switch">
                    <input type="checkbox" id="show-names" checked>
                    <span class="slider"></span>
                </span>
            </label>

            <label class="checkbox-container">
                <span class="checkbox-label">Box Shape</span>
                <span class="switch">
                    <input type="checkbox" id="shape-box">
                    <span class="slider"></span>
                </span>
            </label>
        </div>

        <div class="controls-group">
            <span class="group-title">Configuration</span>
            
            <div class="range-container">
                <div class="range-header">
                    <span>Radar Scale</span>
                    <span id="scale-val">2.0x</span>
                </div>
                <input type="range" id="scale-slider" class="range-input" min="0.5" max="5.0" step="0.1" value="2.0">
            </div>
        </div>
    </div>

    <div id="viewport">
        <canvas id="radarCanvas" width="600" height="600"></canvas>
    </div>

    <script>
        // Parse Lobby ID from URL parameter e.g. ?lobby=LD6BSS
        const urlParams = new URLSearchParams(window.location.search);
        let lobbyId = urlParams.get('lobby') || 'AUTISMO';
        lobbyId = lobbyId.toUpperCase();
        document.getElementById('lobby-id').innerText = lobbyId;

        // UI Controls elements
        const showLocalToggle = document.getElementById('show-local');
        const showFriendsToggle = document.getElementById('show-friends');
        const showEnemiesToggle = document.getElementById('show-enemies');
        const showRingsToggle = document.getElementById('show-rings');
        const showNamesToggle = document.getElementById('show-names');
        const shapeBoxToggle = document.getElementById('shape-box');
        const scaleSlider = document.getElementById('scale-slider');
        const scaleValLabel = document.getElementById('scale-val');

        let radarScale = parseFloat(scaleSlider.value);
        scaleSlider.addEventListener('input', (e) => {
            radarScale = parseFloat(e.target.value);
            scaleValLabel.innerText = radarScale.toFixed(1) + 'x';
        });

        // Setup Canvas
        const canvas = document.getElementById('radarCanvas');
        const ctx = canvas.getContext('2d');
        const center = { x: canvas.width / 2, y: canvas.height / 2 };
        const radius = (canvas.width / 2) - 30;

        // Shared Player state
        let localPlayer = { x: 0, y: 0, z: 0, yaw: 0, name: 'Local' };
        let remotePlayers = {}; // name -> { x, y, z, yaw, lastUpdate }

        // Connect to Rizon IRC Server via KiwiIRC websocket gateway (highly stable)
        const wsServer = "wss://kiwiirc.com/apiv2?server=irc.rizon.net&port=6697&ssl=1";
        let ws = new WebSocket(wsServer);
        
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');

        function setStatus(status, text) {
            statusText.innerText = text;
            if (status === 'connected') {
                statusDot.className = 'status-dot connected';
            } else {
                statusDot.className = 'status-dot';
            }
        }

        ws.onopen = () => {
            setStatus('connecting', 'Authenticating...');
            // IRC Handshake protocol
            const randNick = "web_" + Math.floor(Math.random() * 10000);
            ws.send(`NICK ${randNick}\r\n`);
            ws.send(`USER ${randNick} 0 * :web_radar\r\n`);
        };

        ws.onclose = () => {
            setStatus('disconnected', 'Disconnected. Retrying...');
            setTimeout(() => {
                ws = new WebSocket(wsServer);
            }, 5000);
        };

        ws.onmessage = (event) => {
            const rawLines = event.data.split('\r\n');
            for (let line of rawLines) {
                if (!line) continue;

                // Handle Ping/Pong keep-alive
                if (line.startsWith('PING')) {
                    ws.send('PONG ' + line.substring(5) + '\r\n');
                    continue;
                }

                // Greeting / Welcome message → Join channel
                if (line.includes(' 001 ') || line.includes(' 376 ') || line.toLowerCase().includes('welcome')) {
                    setStatus('connected', 'Connected');
                    const channel = `#mcradar_${lobbyId.toLowerCase()}`;
                    ws.send(`JOIN ${channel}\r\n`);
                }

                // Parse incoming coordinates PRIVMSG
                if (line.includes(' PRIVMSG ')) {
                    const parts = line.split(' :');
                    if (parts.length >= 2) {
                        const payload = parts[1];
                        if (payload.startsWith('COORD,')) {
                            const tokens = payload.split(',');
                            if (tokens.length >= 6) {
                                const pName = tokens[1];
                                const px = parseFloat(tokens[2]);
                                const py = parseFloat(tokens[3]);
                                const pz = parseFloat(tokens[4]);
                                const pyaw = parseFloat(tokens[5]);

                                // Cache first coordinates as local player, others as remote
                                if (!remotePlayers[pName] && Object.keys(remotePlayers).length === 0) {
                                    localPlayer = { x: px, y: py, z: pz, yaw: pyaw, name: pName };
                                } else {
                                    remotePlayers[pName] = {
                                        x: px, y: py, z: pz, yaw: pyaw,
                                        lastUpdate: Date.now()
                                    };
                                }
                            }
                        }
                    }
                }
            }
        };

        // Render Frame Loop
        function drawFrame() {
            // Clear background
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw Radar Container (Circular or Rounded Box)
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
            ctx.lineWidth = 2;
            ctx.fillStyle = '#0d0f17';

            if (shapeBoxToggle.checked) {
                // Draw rounded rect
                ctx.beginPath();
                ctx.roundRect(center.x - radius, center.y - radius, radius * 2, radius * 2, 24);
                ctx.fill();
                ctx.stroke();
            } else {
                ctx.beginPath();
                ctx.arc(center.x, center.y, radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
            }

            // Draw distance rings / grid
            if (showRingsToggle.checked) {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
                ctx.lineWidth = 1;
                const ringIntervals = [50, 100, 150, 200];
                for (let dist of ringIntervals) {
                    const r = dist * radarScale;
                    if (r < radius) {
                        ctx.beginPath();
                        if (shapeBoxToggle.checked) {
                            ctx.roundRect(center.x - r, center.y - r, r * 2, r * 2, 8);
                        } else {
                            ctx.arc(center.x, center.y, r, 0, Math.PI * 2);
                        }
                        ctx.stroke();
                        
                        // Text label
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                        ctx.font = '9px Outfit';
                        ctx.fillText(dist + 'm', center.x + r - 25, center.y - 4);
                    }
                }
            }

            // Local player angle
            const angleRad = (localPlayer.yaw + 180) * Math.PI / 180;
            const c = Math.cos(angleRad);
            const s = Math.sin(angleRad);

            // Draw Local Player Indicator at center
            if (showLocalToggle.checked) {
                ctx.fillStyle = '#00ff66';
                ctx.beginPath();
                ctx.arc(center.x, center.y, 6, 0, Math.PI * 2);
                ctx.fill();
                // Direction indicator line
                ctx.strokeStyle = '#00ff66';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(center.x, center.y);
                ctx.lineTo(center.x - s * 14, center.y + c * 14);
                ctx.stroke();
            }

            // Clean up old inactive remote players (timeout after 10s)
            const now = Date.now();
            for (let name in remotePlayers) {
                if (now - remotePlayers[name].lastUpdate > 10000) {
                    delete remotePlayers[name];
                }
            }

            // Render remote players
            for (let name in remotePlayers) {
                const player = remotePlayers[name];
                
                // Position delta relative to local player
                const dx = player.x - localPlayer.x;
                const dz = player.z - localPlayer.z;

                // Rotate coordinates relative to local player view angle
                let px = dx * c + dz * s;
                let py = -dx * s + dz * c;

                px *= radarScale;
                py *= radarScale;

                // Clamp to radar boundaries
                let outOfBounds = false;
                if (shapeBoxToggle.checked) {
                    const limit = radius - 10;
                    if (Math.abs(px) > limit || Math.abs(py) > limit) {
                        outOfBounds = true;
                        px = Math.max(-limit, Math.min(limit, px));
                        py = Math.max(-limit, Math.min(limit, py));
                    }
                } else {
                    const dist = Math.sqrt(px * px + py * py);
                    if (dist > radius - 10) {
                        outOfBounds = true;
                        const angle = Math.atan2(py, px);
                        px = (radius - 10) * Math.cos(angle);
                        py = (radius - 10) * Math.sin(angle);
                    }
                }

                // Render dot
                ctx.fillStyle = showFriendsToggle.checked ? '#00bfff' : '#ff3333';
                ctx.beginPath();
                ctx.arc(center.x + px, center.y + py, outOfBounds ? 4 : 6, 0, Math.PI * 2);
                ctx.fill();

                // Draw Yaw direction line
                if (!outOfBounds) {
                    const relativeYawRad = ((player.yaw - localPlayer.yaw) + 180) * Math.PI / 180;
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(center.x + px, center.y + py);
                    ctx.lineTo(
                        center.x + px - Math.sin(relativeYawRad) * 12,
                        center.y + py + Math.cos(relativeYawRad) * 12
                    );
                    ctx.stroke();
                }

                // Render name tag
                if (showNamesToggle.checked && !outOfBounds) {
                    ctx.fillStyle = '#ffffff';
                    ctx.font = '10px Outfit';
                    ctx.textAlign = 'center';
                    ctx.fillText(name, center.x + px, center.y + py - 12);
                }
            }

            requestAnimationFrame(drawFrame);
        }

        // Run rendering loop
        drawFrame();
    </script>
</body>
</html>
